<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>BashaDrive Pro - Cuadrante Gigante</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,700,0,0" rel="stylesheet" />

    <style>
        [x-cloak] { display: none !important; }
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: system-ui, -apple-system, sans-serif;
            padding-top: env(safe-area-inset-top);
        }

        /* DISEÑO DE CUADERNOS GIGANTES */
        .bloque-trabajo {
            background: #111827;
            border-radius: 2.5rem;
            border-left: 16px solid;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        /* COLORES SEGÚN ACTIVIDAD */
        .border-expres { border-left-color: #0ea5e9; }  /* Azul */
        .border-normal { border-left-color: #10b981; } /* Verde para Ciu-Mao Mañanas */
        .border-tarde { border-left-color: #f59e0b; }   /* Naranja/Tarde */
        .border-libre { border-left-color: #475569; opacity: 0.6; } /* Gris */

        /* BUSES EN FORMATO MAXI */
        .bus-badge-pro {
            background: #f97316;
            color: #000000;
            padding: 10px 24px;
            border-radius: 1.2rem;
            font-weight: 900;
            font-size: 2.8rem;
            line-height: 1;
            display: inline-block;
            box-shadow: 0 4px 0 #c2410c;
        }

        .texto-servicio {
            font-size: 1.6rem;
            font-weight: 800;
            line-height: 1.3;
            margin-top: 1.5rem;
            color: #f8fafc;
            white-space: pre-wrap; /* Respeta los saltos de línea si hay varios servicios */
        }
        
        .texto-obs {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fbbf24;
            margin-top: 1rem;
            font-style: italic;
        }

        .info-fecha {
            font-size: 1.2rem;
            font-weight: 900;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .dieta-alerta {
            margin-top: 1.5rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 1rem;
            border-radius: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body x-data="bashaApp()" x-init="init()">

    <!-- CABECERA -->
    <header class="p-6 sticky top-0 bg-black/90 backdrop-blur-md z-40 flex justify-between items-center border-b border-white/10">
        <div>
            <h1 class="text-2xl font-black text-orange-500 italic">BASHADRIVE <span class="text-white">PRO</span></h1>
            <p class="text-[10px] font-bold text-sky-400 tracking-widest uppercase">Cód. 86 • Lector Inteligente</p>
        </div>
        <button @click="ui.showImport = true" class="bg-orange-600 w-16 h-16 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(249,115,22,0.4)] active:scale-90 transition">
            <span class="material-symbols-outlined text-4xl text-white">content_paste</span>
        </button>
    </header>

    <!-- CUADRANTE VISUAL -->
    <main class="p-4 pb-32 overflow-y-auto hide-scrollbar">
        
        <template x-if="planning.length === 0">
            <div class="text-center py-20 opacity-20">
                <span class="material-symbols-outlined text-7xl">post_add</span>
                <p class="font-black uppercase mt-4 tracking-widest">Pega tu cuadrante de la empresa</p>
            </div>
        </template>

        <template x-for="(dia, index) in planning" :key="index">
            <!-- Solo muestra el bloque si tiene servicio o es libre -->
            <div x-show="dia.servicio !== ''" class="bloque-trabajo" :class="getEstilo(dia.servicio)">
                
                <div class="flex justify-between items-start">
                    <div class="dia-info">
                        <p class="info-fecha" x-text="dia.diaSemana"></p>
                        <p class="text-white font-bold text-lg" x-text="dia.fecha"></p>
                    </div>
                    <!-- Área de Buses Extra Grandes -->
                    <div class="flex flex-col gap-3 items-end">
                        <template x-for="bus in dia.buses">
                            <span class="bus-badge-pro" x-text="bus"></span>
                        </template>
                    </div>
                </div>
                
                <h2 class="texto-servicio" x-text="dia.servicio"></h2>
                
                <!-- Observaciones especiales (Como coger coche de empresa) -->
                <p x-show="dia.obs !== ''" class="texto-obs" x-text="'👉 ' + dia.obs"></p>
                
                <!-- Dieta Automática si detecta la palabra Tarde -->
                <div class="dieta-alerta" x-show="dia.dieta">
                    <span class="material-symbols-outlined text-emerald-400 text-3xl">restaurant</span>
                    <span class="text-emerald-400 font-black text-xs uppercase tracking-tighter">Dieta de Cena / Turno Tarde</span>
                </div>
            </div>
        </template>
    </main>

    <!-- PANTALLA DE PEGADO DE TEXTO -->
    <div x-show="ui.showImport" x-cloak class="fixed inset-0 bg-black/98 z-[100] p-6 flex flex-col backdrop-blur-xl">
        <div class="flex justify-between items-center mb-8 pt-6">
            <h2 class="text-2xl font-black text-orange-500 uppercase">Importar Texto PDF</h2>
            <button @click="ui.showImport = false" class="text-white bg-white/10 p-2 rounded-full"><span class="material-symbols-outlined text-2xl">close</span></button>
        </div>
        
        <p class="text-sm text-sky-400 font-bold mb-4">Copia todo el texto de tu cuadrante semanal PDF y pégalo tal cual en esta caja. La App lo ordenará sin fallos.</p>
        
        <textarea x-model="inputRaw" class="flex-grow bg-white/5 border border-white/20 rounded-[2.5rem] p-6 outline-none text-base font-mono text-gray-300" placeholder="Pega aquí el texto del PDF..."></textarea>
        
        <button @click="procesarCuadrante()" class="mt-8 bg-orange-600 text-white py-6 rounded-full font-black text-xl uppercase shadow-[0_0_30px_rgba(249,115,22,0.4)] active:scale-95 transition-all">
            LEER Y ORDENAR SEMANA
        </button>
    </div>

    <script>
        function bashaApp() {
            return {
                ui: { showImport: false },
                inputRaw: '',
                planning:[],

                init() {
                    const saved = localStorage.getItem('bashadrive_plan_v4');
                    if (saved) {
                        this.planning = JSON.parse(saved);
                    }
                },

                getEstilo(serv) {
                    if (!serv) return '';
                    const s = serv.toUpperCase();
                    if (s.includes('EXPRES')) return 'border-expres';
                    if (s.includes('LIBRE')) return 'border-libre';
                    if (s.includes('TARDE')) return 'border-tarde';
                    return 'border-normal';
                },

                procesarCuadrante() {
                    if(!this.inputRaw.trim()) {
                        alert("Pega el texto de la semana primero.");
                        return;
                    }
                    
                    let lineas = this.inputRaw.split('\n');
                    
                    // Creamos la plantilla semanal vacía
                    let semana = Array(7).fill().map((_, i) => ({ 
                        diaSemana:['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'][i], 
                        fecha: '', servicio:[], buses:[], obs:[] 
                    }));

                    // 1. Extraer Fechas (busca 11-05-26, etc)
                    let regexFecha = /\d{2}[-/]\d{2}([-/]\d{2,4})?/g;
                    for(let lin of lineas) {
                        let fechas = lin.match(regexFecha);
                        if(fechas && fechas.length >= 7) {
                            fechas.slice(0,7).forEach((f, i) => semana[i].fecha = f.substring(0,5)); // Coge solo DD-MM
                            break;
                        }
                    }

                    // 2. Extraer los datos fila por fila
                    for(let lin of lineas) {
                        if(!lin.trim()) continue;
                        let headerLow = lin.toLowerCase();
                        
                        // Ignorar líneas de cabecera que no son turnos
                        if(headerLow.includes('planning') || headerLow.includes('servicio-turno') || headerLow.includes('cód. cond')) continue;
                        if(headerLow.includes('parte semanal') || headerLow.includes('nota importante')) continue;

                        // SEPARADOR HERMÉTICO: Busca tabulaciones (PDF) o múltiples espacios, no espacios simples.
                        let separador = lin.includes('\t') ? '\t' : '  ';
                        let celdas = lin.split(new RegExp(separador + '+')).map(c => c.trim());
                        
                        if(celdas.length < 2) continue;
                        
                        let tituloFila = celdas[0]; // Ej: "Ciu-Mao 1º Mañanas"

                        if(headerLow.includes('libre')) {
                            this.asignarCeldas(celdas, semana, "DÍA LIBRE", false);
                            continue;
                        }

                        if(headerLow.includes('obseva') || headerLow.includes('observa')) {
                            this.asignarCeldas(celdas, semana, null, true);
                            continue;
                        }

                        // Si es una línea de turnos normal
                        this.asignarCeldas(celdas, semana, tituloFila, false);
                    }
                    
                    // 3. Limpiar y Formatear la vista final
                    this.planning = semana.map(d => ({
                        diaSemana: d.diaSemana,
                        fecha: d.fecha,
                        // Si hay varios servicios el mismo día (Ej: Lunes), los apila con un '+'
                        servicio: d.servicio.filter((item, pos) => d.servicio.indexOf(item) === pos).join('\n+ '),
                        // Evita números de bus repetidos
                        buses: d.buses.filter((item, pos) => d.buses.indexOf(item) === pos),
                        obs: d.obs.filter(o => o !== '').join(' | '),
                        dieta: d.servicio.some(s => s.toUpperCase().includes('TARDE'))
                    }));
                    
                    localStorage.setItem('bashadrive_plan_v4', JSON.stringify(this.planning));
                    this.ui.showImport = false;
                    this.inputRaw = '';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                },

                asignarCeldas(celdas, semana, tituloFila, esObs) {
                    let dia = 0;
                    // Avanzamos de 2 en 2 porque la tabla del PDF agrupa (Servicio, Bus)
                    for(let i = 1; i < celdas.length; i += 2) {
                        if(dia > 6) break;
                        
                        let colA = celdas[i] || '';
                        let colB = celdas[i+1] || '';

                        if(esObs) {
                            if(colA && colA.length > 2) semana[dia].obs.push(colA);
                            if(colB && colB.length > 2) semana[dia].obs.push(colB);
                        } else {
                            if(colA !== '' || colB !== '') {
                                // Si hay algo escrito en la celda del día, asignamos el título de la fila
                                if(tituloFila) semana[dia].servicio.push(tituloFila);
                                
                                // ESCÁNER DE AUTOBUSES: Sabemos que los autobuses SIEMPRE son números.
                                // Si la celda es un número, es un autobús al 100%. Así jamás mezcla texto.
                                if(/^\d{1,4}$/.test(colA)) semana[dia].buses.push(colA);
                                if(/^\d{1,4}$/.test(colB)) semana[dia].buses.push(colB);
                            }
                        }
                        dia++;
                    }
                }
            }
        }
    </script>
</body>
</html>
